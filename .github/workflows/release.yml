name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish release
    runs-on: macos-15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Derive version
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build app bundle
        env:
          VERSION: ${{ steps.version.outputs.version }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: ./build-app.sh release

      - name: Package app zip
        shell: bash
        run: |
          mkdir -p dist
          ditto -c -k --keepParent GHub.app "dist/GHub-${{ steps.version.outputs.version }}-macOS.zip"
          shasum -a 256 "dist/GHub-${{ steps.version.outputs.version }}-macOS.zip" > "dist/GHub-${{ steps.version.outputs.version }}-macOS.zip.sha256"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/GHub-${{ steps.version.outputs.version }}-macOS.zip
            dist/GHub-${{ steps.version.outputs.version }}-macOS.zip.sha256
