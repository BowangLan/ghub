name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Swift build
    runs-on: macos-15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Show Swift version
        run: swift --version

      - name: Build debug
        run: swift build

      - name: Build release
        run: swift build -c release
